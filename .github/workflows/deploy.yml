name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs

      - name: Deploy to Hostinger via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.SSH_PROJECT_DIR }}
            
            # Initialize git if not already initialized
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/dastian95/sekolah.git
              git fetch origin main
              git checkout main
            else
              git fetch origin main
              git reset --hard origin/main
            fi
            
            # Install dependencies and clear cache
            composer install --no-dev --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs
            
            # Put app in maintenance mode
            php artisan down || true
            
            # Run migrations
            php artisan migrate --force
            
            # Create storage link
            php artisan storage:link || true
            
            # Cache configuration and routes
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache
            
            # Restart queue
            php artisan queue:restart || true
            
            # Bring app back online
            php artisan up
