name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          command_timeout: 30m
          script: |
            cd ${{ secrets.SSH_PROJECT_DIR }}

            echo "=== Git pull latest code ==="
            git fetch origin
            git reset --hard origin/main

            echo "=== Detect PHP version ==="
            if command -v php82 &> /dev/null; then
              PHP_BIN="php82"
            elif command -v php83 &> /dev/null; then
              PHP_BIN="php83"
            else
              PHP_BIN="php"
            fi
            echo "Using: $($PHP_BIN -v | head -1)"

            echo "=== Install Composer dependencies ==="
            composer install --no-dev --optimize-autoloader --no-scripts --ignore-platform-reqs

            echo "=== Clear caches ==="
            $PHP_BIN artisan cache:clear 2>&1 || true
            $PHP_BIN artisan config:clear 2>&1 || true
            $PHP_BIN artisan route:clear 2>&1 || true
            $PHP_BIN artisan view:clear 2>&1 || true

            echo "=== Run migrations ==="
            $PHP_BIN artisan migrate --force

            echo "=== Create storage link ==="
            $PHP_BIN artisan storage:link 2>&1 || true

            echo "=== Cache for production ==="
            $PHP_BIN artisan config:cache
            $PHP_BIN artisan route:cache
            $PHP_BIN artisan view:cache

            echo "=== Set permissions ==="
            chmod -R 755 storage/ bootstrap/cache/

            echo "✓ Deployment completed!"
