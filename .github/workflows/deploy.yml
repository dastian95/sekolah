name: Deploy to Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs

      - name: Upload files via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            cd ${{ secrets.SSH_PROJECT_DIR }}
            
            # Backup current .env
            cp .env .env.backup 2>/dev/null || true
            
            # Download latest code from GitHub
            curl -L https://github.com/dastian95/sekolah/archive/refs/heads/main.zip -o main.zip
            unzip -o main.zip
            cp -r sekolah-main/* .
            rm -rf sekolah-main main.zip
            
            # Restore .env
            mv .env.backup .env 2>/dev/null || true
            
            # Install dependencies
            composer install --no-dev --optimize-autoloader --no-interaction --no-scripts --ignore-platform-reqs
            
            # Run migrations
            php artisan migrate --force 2>/dev/null || true
            
            # Cache configuration
            php artisan config:cache 2>/dev/null || true
            php artisan route:cache 2>/dev/null || true
            php artisan view:cache 2>/dev/null || true
            
            # Set permissions
            chmod -R 755 storage/ bootstrap/cache/ 2>/dev/null || true
